manage_multiplier_options:
  buttons:
    disable_multipliers:
      label: "Disable multipliers"
    enable_multipliers:
      label: "Enable multipliers"

    add_multiplier:
      label: "Add multipliers"

    edit_multiplier:
      label: "Edit multipliers"

  modals:
    errors:
      multiplier_defined: "Man, this role is already an XP multiplier lol"
      invalid_multiplier: >
        Hey, send a valid multiplier between 1.1x and 99.9x.
        Anything lower or higher than that, I can`t handle {sob}.

    change_factor:
      title: "Change multiplier"
      label: "New multiplier"
      placeholder: "Enter a value between 1.1x and 99.9x"

    add_multiplier:
      title: "Add multiplier"
      label: "New multiplier"

  embed:
    title: "Edit Multipliers"
    description: >
      Here you can select an existing XP multiplier to view, 
      edit its settings, or delete it if you want. Below, there`s a menu 
      with the multipliers created in this server. 
      Just click it and choose the one you want.  

      {support_text}
    mul_status: '{text} {status}.'
    stacking_status: '{text} {status}.'

  embed_role:
    description: >-
      Here you can view, adjust, or delete this role you`ve set 
      as an XP multiplier. XP multiplier roles determine how much extra XP 
      members with this role will receive.


      - {role_text}

      - {text_boost}


      {support_text}
    role_text: "{text_role} {role_formatted}."
    text_boost: "{text_boost} {boost}x."

  note: >
    {obs} Some settings here may not work properly
     because XP multipliers are disabled. {warning}

manage_role_multiplier_options:
  buttons:
    change_multiplication:
      label: "Change multiplier"

    del_multplier:
      label: "Delete multiplier"

  messages:
    delete_message: >
      Are you sure you want to delete the "{role_mention}" multiplier?
