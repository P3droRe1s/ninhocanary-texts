manage_multiplier_options:
  buttons:
    disable_multipliers:
      label: 'Disable multipliers'
    enable_multipliers:
      label: 'Enable multipliers'

    add_multiplier:
      label: 'Add multipliers'
    
    edit_multiplier:
      label: 'Edit multipliers'

  embed:
    title: 'Edit XP Multipliers'
