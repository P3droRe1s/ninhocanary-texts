confirm_reward_delete:
  embed:
    rewards_amount: 'Number of rewards: {amount}.'

manage_rewards_options:
  buttons:
    disable_rewards:
      label: 'Disable rewards'
    enable_rewards:
      label: 'Enable rewards'

    add_reward:
      label: 'Add reward'
    
    edit_reward:
      label: 'Edit Reward'

  embed:
    title: 'Edit Reward Roles'
    description: >
      Here you can select an existing reward role to view,
      edit its settings, or delete it if you want. Below, there`s a menu 
      with all the rewards created in this server. Just click it and
      choose the one you want.

      {support_text}
    reward_status: 'Rewards: {status}.'
    stacking_status: 'Stacking rewards: {status}.'

  note: >
    {obs} Some settings here may not work properly because reward roles are disabled. {warning}

