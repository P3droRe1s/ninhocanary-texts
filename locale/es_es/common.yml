common:
  errors:
    guild_only: >
      Oye... Este comando solo se puede usar en servidores {sob}{pray}.
    missing_admin: >
      Solo el dueño del servidor y los administradores pueden usar este comando.
    missing_manage_server: >
      Solo el dueño del servidor, administradores y personas con el permiso
      "{manage_server_permission}" pueden usar este comando.
    command_loading: >
      Oye, este comando todavía se está cargando. Inténtalo de nuevo en unos segundos jajaja.
      Si sigue pasando, contáctanos en {support_guild_hyperlink}.
    unexpected_error: >
      Oye, ocurrió un error bastante raro por aquí jajaja. Habla con el equipo en
      {support_guild_hyperlink}.
    user_not_found: >
      Oye, no encontré a ese usuario en el servidor. ¿Seguro que
      escribiste el nombre correctamente? {sob}
    invalid_role_id: >
      Oye, escribe bien el ID, ese no corresponde a ningún rol válido {skull}.
    invalid_position: >
      Oye, ese rol está por encima de mí en la jerarquía.
      Coloca mi rol por encima para que pueda recompensar a los
      miembros {thumbsup}.
    invalid_channel: >
      Oops, ese ID no parece ser de un canal válido {skull}.
      Revísalo bien y vuelve a intentarlo.

  support: '[servidor de soporte]({support_guild})'

  buttons:
      open_panel: 'Llévame al panel'

  menus:
    select_option: 'Selecciona una opción...'

  success:
    dm_sent: '¡Te lo envié por DM! ;)'

  status:
    actived: 'Activado'
    disabled: 'Desactivado'

    yes: 'Sí'
    no: 'No'