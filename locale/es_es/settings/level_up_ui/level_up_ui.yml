level_notification_options:
  buttons:
    disable_notifications:
      label: 'Desactivar notificaciones'
    enable_notifications:
      label: 'Activar notificaciones'

    disable_level_up_notification:
      label: 'Desactivar notificaciones de nivel'
    enable_level_up_notification:
      label: 'Activar notificaciones de nivel'

    edit_level_up_message:
      label: 'Editar mensaje de nivel'

  embed:
    title: 'Editar mensaje de nivel'
    description: >-
      Aquí puedes dejar el mensaje de subida de nivel a tu gusto:
      elegir dónde se enviará, definir cada cuántos niveles aparece
      y probar todo para ver cómo queda.


      - {channel_text}

      - {interval_text}

      - {dm_text}


      {support_text}
    notification_status: '**Módulo de notificaciones:** {status}.'
    level_up_status: '**Notificaciones de nivel:** {status}.'
    channel_status: '**Canal donde se enviará el mensaje:** {channel}.'
    interval: '**Cada cuántos niveles se enviará el mensaje:** {interval}.'
    dm_notify: '**Notificar por DM:** {status}.'

  channel_none: 'sin canal'

  note: >
    **Nota:** Algunas configuraciones aquí pueden no funcionar correctamente,
    porque las notificaciones de nivel están desactivadas. {warning}

edit_level_messages_options:
  buttons:
    button_test_message:
      label: '¡Oye! Este es un mensaje de prueba'

    test_dm_message:
      label: >
        Mensaje de prueba enviado desde el servidor "{guild_name}"

    edit_message:
      label: 'Editar mensaje'

    show_message:
      label: 'Mostrar mensaje'

    test_message:
      label: 'Probar mensaje'

    placeholders_list:
      label: 'Lista de variables'

  errors:
    dm_forbidden: >
      Oye, intenté enviarte el mensaje de prueba por DM, pero
      los tienes desactivados en este servidor. Actívalos y vuelve a intentar.
    channel_forbidden: >
      Oye, intenté enviar el mensaje de prueba al canal que elegiste,
      pero parece que no tengo permisos para hacerlo.
      Échale un vistazo.

  placeholders_embed:
    title: 'Lista de variables'
    description: |
      Aquí tienes algunas variables que puedes usar para personalizar tu
      mensaje de nivel. Solo tienes que ponerlas en el texto y mostraré
      el valor correspondiente en el momento.

      - {user_mention_str}: menciona al usuario.
      - {user_name_str}: muestra el nombre visible del usuario.
      - {user_id_str}: muestra el ID del usuario.
      - {user_tag_str}: muestra el nombre global del usuario.
      - {user_level_str}: muestra el nivel actual del usuario.
      - {user_xp_total_str}: muestra el XP total del usuario.
      - {user_xp_textual_str}: muestra el XP por texto del usuario.
      - {user_xp_vocal_str}: muestra el XP en llamada del usuario.
      - {user_next_level_str}: muestra el siguiente nivel del usuario.
      - {user_ranking_str}: muestra la posición del usuario en el ranking del servidor.
      - {user_next_level_required_xp}: muestra cuánto XP falta para el siguiente nivel.
      - {user_next_level_total_xp}: muestra el XP total necesario para el siguiente nivel.

edit_notification_level_up_message_options:
  buttons:
    disable_dm_notification:
      label: 'Desactivar notificación por DM'
    enable_dm_notification:
      label: 'Activar notificación por DM'

    manage_message:
      label: 'Gestionar mensaje'

    change_channel:
      label: 'Cambiar canal'

    change_interval:
      label: 'Cambiar intervalo'

  modals:
    change_channel:
      title: 'Cambiar canal'
      label: 'Nuevo canal'
      placeholder: 'Escribe el ID del canal o déjalo en blanco para quitar el actual'

    change_interval:
      errors:
        invalid_interval: >
          Oye, ese intervalo no es válido. Introduce un número entero
          entre 1 y 99. :)

      title: 'Cambiar intervalo'
      label: 'Nuevo valor del intervalo'
      placeholder: 'Introduce el intervalo deseado'

    edit_message:
      title: 'Editar mensaje'
      label: 'Nuevo mensaje'
      placeholder: 'Escribe el nuevo mensaje. Usa {} para insertar variables.'

  embed:
    title: 'Gestionar mensaje'
    description: >-
      Aquí puedes editar el mensaje de nivel que reciben los miembros del
      servidor al subir de nivel, ver cuál está configurado actualmente
      y probar cómo se enviará y se mostrará a los miembros.


      {support_text}