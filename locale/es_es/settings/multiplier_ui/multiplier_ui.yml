manage_multiplier_options:
  buttons:
    disable_multipliers:
      label: 'Desactivar multiplicadores'
    enable_multipliers:
      label: 'Activar multiplicadores'

    add_multiplier:
      label: 'Añadir multiplicador'
    
    edit_multiplier:
      label: 'Editar multiplicadores'

  modals:
    errors:
      multiplier_defined: 'Oye, ese rol ya tiene un multiplicador de XP jajaja'
      invalid_multiplier: >
        Oye, introduce un multiplicador válido entre 1.1x y 99.9x.
        Menos o más que eso no lo acepto {sob}.

    change_factor:
      title: 'Cambiar multiplicador'
      label: 'Nuevo multiplicador'
      placeholder: 'Introduce un valor entre 1.1x y 99.9x'

    add_multiplier:
      title: 'Añadir multiplicador'
      label: 'Nuevo multiplicador'

  embed:
    title: 'Editar multiplicadores'
    description: >-
      Aquí podrás elegir un multiplicador de XP ya creado para ver sus detalles,
      editar su configuración o eliminarlo si quieres. Justo abajo encontrarás
      un menú con todos los multiplicadores creados en este servidor.
      Solo tienes que hacer clic y seleccionar el que quieras.


      {support_text}
    mul_status: '{text} {status}.'
    stacking_status: '{text} {status}.'

  embed_role:
    description: >-
      Aquí puedes ver, ajustar o eliminar este rol que has definido
      como multiplicador de XP. Los roles con multiplicador determinan
      cuánto XP extra recibirán los miembros que lo tengan.


      - {role_text}

      - {text_boost}


      {support_text}
    role_text: '{text_role} {role_formatted}.'
    text_boost: '{text_boost} {boost}x.'

  note: >
    {obs} Algunas configuraciones aquí pueden no funcionar correctamente,
    porque los multiplicadores de XP están desactivados. {warning}

manage_role_multiplier_options:
  buttons:
    change_multiplication:
      label: 'Cambiar multiplicador'

    del_multplier:
      label: 'Eliminar multiplicador'

  messages:
    delete_message: >
      ¿Seguro que quieres eliminar el multiplicador "{role_mention}"?