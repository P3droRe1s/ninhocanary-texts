manage_rewards_options:
  buttons:
    disable_rewards:
      label: 'Desactivar recompensas'
    enable_rewards:
      label: 'Activar recompensas'

    add_reward:
      label: 'Añadir recompensa'
    
    edit_reward:
      label: 'Editar recompensas'

  modals:
    errors:
      reward_defined: 'Oye, ese rol ya es una recompensa jajaja'

    add_role:
      title: 'Añadir recompensa'
      label: 'Nueva recompensa'    

  embed:
    title: 'Editar recompensas'
    description: >-
      Aquí podrás elegir un rol de recompensa ya creado para ver sus detalles,
      editar su configuración o eliminarlo si quieres. Justo abajo encontrarás
      un menú con todas las recompensas creadas en este servidor.
      Solo tienes que hacer clic y seleccionar la que quieras.


      {support_text}
    reward_status: '{text} {status}.'
    stacking_status: '{text} {status}.'

  embed_role:
    description: >-
      Aquí puedes ajustar cómo se obtiene este rol de recompensa
      y cuánto XP necesita un miembro para conseguirlo.


      - {role_text}

      - {xp_type_text}

      - {xp_required_text}


      {support_text}
    role_text: '{text_role} {role_formatted}.'
    xp_type_text: '{text} {xp_type}.'
    xp_required_text: '{text} {xp}.'

  xp_type_list:
    - XP total
    - XP por texto
    - XP en llamada

  note: >
    {obs} Algunas configuraciones aquí pueden no funcionar correctamente,
    porque los roles de recompensa están desactivados. {warning}

manage_role_reward_options:
  buttons:
    edit_unlock:
      label: 'Cambiar forma de obtención'

    edit_xp:
      label: 'Cambiar XP necesario'

    delete_reward:
      label: 'Eliminar recompensa'

  modals:
    errors:
      invalid_xp: >
        Oye, ayúdame un poco... solo acepto números enteros entre 1 y 1.000.000.000.000 :p

    replace_xp:
      title:  'Cambiar XP necesario'
      label: 'Nuevo valor de XP'
      placeholder: 'Introduce un valor entre 1 y 1.000.000.000.000'

  messages:
    delete_message: >
      ¿Seguro que quieres eliminar la recompensa "{role_mention}"?