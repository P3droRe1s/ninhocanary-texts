config:
  aliases:
    - configurar
    - settings

  embed:
    title: 'Configurações'
    global_xp_warning: >
      Vale ressaltar que essas configurações não vão afetar o ganho de XP global.
    description: >
      Aqui você pode configurar meu comportamento para atender às suas
      necessidades no servidor. Logo abaixo, você poderá escolher uma opção
      para ver mais detalhes ou configurar do seu jeitinho. Em caso de dúvidas
      ou problemas, não hesite em entrar em contato no servidor de suporte.
