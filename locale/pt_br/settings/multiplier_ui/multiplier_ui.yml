confirm_multiplier_delete:
  embed:
    mul_amount: 'Quantidade de multiplicadores: {amount}.'

manage_multiplier_options:
  buttons:
    disable_multipliers:
      label: 'Desativar multiplicadores'
    enable_multipliers:
      label: 'Ativar multiplicadores'

    add_multiplier:
      label: 'Adicionar multiplicador'
    
    edit_multiplier:
      label: 'Editar multiplicadores'

  embed:
    title: 'Editar Multiplicadores de XP'
    description: >
      Aqui você poderá escolher um multiplicador de XP já criado para visualizar,
      editar suas configurações ou excluir, caso queira. Logo abaixo, há um menu
      com todos os multiplicadores criados neste servidor. Basta clicar nele e
      selecionar o multiplicador desejado.

      {support_text}
    mul_status: 'Multiplicadores de XP: {status}.'
    stacking_status: 'Empilhar multiplicadores: {status}.'

  note: >
    {obs} Algumas configurações aqui podem não funcionar direito,
    porque os multiplicadores de XP estão desativados. {warning}

manage_role_multiplier_options:
  buttons:
    change_multiplication:
      label: 'Alterar multiplicação'

    del_multplier:
      label: 'Deletar multiplicador'

  messages:
    delete_message: >
      Tem certeza que quer deletar o multiplicador "{role_mention}"?
