preferences:
  buttons:
    disable_level_up_dm_not:
      label: 'Disable DM Level-Up Notifications'
    enable_level_up_dm_not:
      label: 'Enable DM Level-Up Notifications'

  embeds:
    guide: 'Select a topic below to learn more.'

    pref_embed:
      title: 'Preferences'
      description: >-
        Here you can customize your Ninho experience. Choose your preferred
        language and manage level-up notifications sent via direct messages
