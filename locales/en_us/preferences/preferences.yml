        how Ninho behaves for other members or servers.


        {language_msg}
        {level_up_not_msg}

        {support_text}

      level_up_not_msg: >
        - **Level-Up DM Notifications:** {status}.

      language_msg: >
        - **Language:** {language}.

  success: 'I sent the preferences panel to your DM! ;)'
