manage_rewards_options:
  buttons:
    disable_rewards:
      label: "Disable rewards"
    enable_rewards:
      label: "Enable rewards"

    add_reward:
      label: "Add reward"

    edit_reward:
      label: "Edit Reward"

  modals:
    errors:
      reward_defined: "Man, this role is already a reward lol."

    add_role:
      title: "Add reward"
      label: "New reward"

  embed:
    title: "Edit Reward Roles"
    description: >-
      Here you can select an existing reward role to view,
      edit its settings, or delete it if you want. Below, there's a menu 
      with all the rewards created in this server. Just click it and
      choose the one you want.


      {support_text}
    reward_status: "**Rewards:** {status}."
    stacking_status: "**Stacking Rewards:** {status}."

  embed_role:
    description: >-
      Here you can adjust how this reward role is unlocked
      and how much XP a member needs to obtain it.


      - {role_text}

      - {xp_type_text}

      - {xp_required_text}


      {support_text}
    role_text: "**Role:** {role_formatted}."
    xp_type_text: "**XP Type:** {xp_type}."
    xp_required_text: "**XP Required:** {xp}."

  xp_type_list:
    - Total XP
    - Text XP
    - Voice XP

  note: >-


    **NOTE:** Some settings here may not work properly 
    because reward roles are disabled. {warning}

manage_role_reward_options:
  buttons:
    edit_unlock:
      label: "Change XP type"

    edit_xp:
      label: "Change required XP"

    delete_reward:
      label: "Delete reward"

  modals:
    errors:
      invalid_xp: >
        Man, help me out here... I only accept whole numbers
        between 1 and 1,000,000,000,000 :p

    replace_xp:
      title: "Change required XP"
      label: "New XP value"
      placeholder: "Enter a value between 1 and 1,000,000,000,000"

  messages:
    delete_message: >
      Are you sure you want to delete the "{role_mention}" reward?
