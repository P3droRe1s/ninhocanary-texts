select_option:
  manage_multiplier_options:
    embed:
      mul_size: '**Number of Multipliers:** {quantity} of {max}.'

  manage_rewards_options:
    embed:
      reward_size: '**Number of Rewards:** {quantity} of {max}.'

  menus:
    options:
      label:
        language: 'Language'
        xp_multiplier: 'XP Multipliers'
        weekend: 'Weekend Boost'
        rewards: 'Reward Roles'
        notification: 'Progress Notifications'

  embed:
    language:
      title: 'Language'
      description:
        Here you can select one of the available languages for Ninho
        to use in this server. If a member has a preferred language
        configured, Ninho will use that language instead of the
        language defined for this server.


        - **Language:** {language}.


        {support_text}

    multiplier:
      title: 'XP Multipliers'
      description:
        Configure the server's XP multipliers here.
        Choose which roles will increase members' XP, adjust the bonus amount,
        and decide whether multipliers should stack.


        - **XP Multipliers:** {multiplier_status}.

        - **Stacking Multipliers:** {stacking_status}.

        - **Number of Multipliers:** {quantity} of {max}.


        {support_text}

    weekend:
      title: 'Weekend Boost'
      description:
        Here you can configure the server's weekend boost. When enabled,
        members earn extra XP on Saturdays and Sundays, and on Fridays too
        if you'd like. You can also adjust the XP multiplier used for the weekend bonus.


        - **Weekend Boost:** {weekend_status}.

        - **Friday Boost:** {friday_status}.

        - **XP Multiplier:** {xp_multiplier}.


        {support_text}

    rewards:
      title: 'Reward Roles'
      description:
        Configure the server's automatic rewards here.
        When enabled, Ninho will grant roles to members as they
        reach the configured levels.


        - **Rewards:** {rewards_status}.

        - **Stacking Rewards:** {stacking_status}.

        - **Number of Rewards:** {quantity} of {max}.


        {support_text}

    notification:
      title: 'Progress Notifications'
      description:
        Configure the server's level notifications here.
        When enabled, Ninho will send a message whenever a member levels up.


        - **Notifications:** {notification_status}.

        - **Level-Up Notifications:** {level_up_notification_status}.


        {support_text}
