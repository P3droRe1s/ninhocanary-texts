xp:
  errors:
    server_xp_guild_only: >
      This command only works inside servers {sob}.
      If you want to see your global XP, use `.xp global`.

  buttons:
    vote:
      label: 'Vote to earn +10% XP'
    voted:
      label: 'Your boost expires in {formatted}'

  embed:
    description: >-
      ### {title} {eyes}

      {start}


      {dart} **Current Level:** {current_level}.

      {trophy} **Rank:** {rank}.


      {star} **Total XP:** {total_xp}.

      {scroll} **Text XP:** {text_xp}.

      {microphone} **Voice XP:** {voice_xp}.


      {hourglass} **Next Level:** {next_level}.
      {message_reward}{message_multiplier}{target_user_msg}

  embed_global_xp:
    title: 'View Global XP'
    start:
      Here you can view essential information
      about your progress or another user's progress
      in the global user rankings.

  embed_server_xp:
    title: 'View Server XP'
    start:
      Here you can view essential information
      about the server's progress in the global
      server rankings.

  embed_user_xp:
    title: 'View XP'
    start:
      Here you can view essential information about
      your progress or another member's progress
      within this server.

  friday_true: >-

    {smirk} **NOTE:** A {weekend_multiplier}x multiplier
    is active during the weekend (Friday included hehe)!

  weekend_true: >-

    {sparkles} **NOTE:** A {weekend_multiplier}x multiplier
    is active during the weekend!

  ranking_none: 'Unranked'
  next_reward_head: >-

    {present} **Next Reward(s):**
  reward_info: >-

    • {reward_mention} ({r_type_str}) _~ [{user_xp}/{xp_required}]_

  multiplier_info:
    not_stacking: >-

      {sparkles} **XP Bonus:** By having the {role} role, you get
      {multiplier}x more XP.

    stacking: >-

      {sparkles} **XP Bonus:** By having multiple roles that boost your XP,
      you get {multiplier}x more XP.

  duration:
    hours: '{hours}h'
    minutes: '{minutes}m'
    seconds: '{seconds}s'

  field: |-

    {compass} **Goal:**

  target_user:
    overtake: >

      {field} Earn +{xp_required} XP to overtake {name}
      and reach #{rank}!

    keep_first_place: >

      {field} Only {xp_required} XP left for {name} to overtake you.
      Keep earning XP and hold onto the #1 spot!
