common:
  errors:
    guild_only: >
      Ei, cara... Este comando só pode ser utilizado em servidores. {sob}{pray}
    missing_admin: >
      Apenas o dono do servidor e administradores podem utilizar esse comando.
    missing_manage_server: >
      Apenas o dono do servidor, administradores e pessoas com a permissão
      `Gerenciar Servidor` podem utilizar esse comando.
    command_loading: >
      Macho, esse comando ainda está carregando. Tenta de novo em alguns segundos, kkk.
      Se continuar acontecendo, chama a gente no {support_guild_hyperlink}.
    unexpected_error: >
      Meu mano, deu um erro cabuloso aqui, kkkkk. Fale com o pessoal no
      {support_guild_hyperlink}.
    user_not_found: >
      Mano, não achei esse usuário aqui no servidor não. Tem certeza que
      digitou o nome certinho? {sob}
    invalid_role_id: >
      Lil bro, escreve o ID direito, esse daí nem representa um cargo válido. {skull}
    invalid_position: >
      Bro, esse cargo tá acima do meu na hierarquia, não gostei.
      Coloca meu cargo acima dele aí pra eu conseguir recompensar os
      membros. {thumbsup}
    invalid_channel: >
      Oops, esse ID aí não parece ser de um canal válido {skull}.
      Confere ele direito e tenta de novo.
    forbidden_channel: >
      Mano, eu não tenho permissão para enviar mensagens nesse canal.
      Como eu vou enviar mensagens de level up se nem consigo falar lá? {sob}
    forbidden_guild: >
      Mano, tô sem permissão pra fazer isso. Pede pra um admin ajustar
      minhas permissões ou chama a gente no {support_guild_hyperlink}. ;)
    forbidden_member: >
      Não consegui te mandar o painel na DM. Abre suas mensagens diretas
      e tente de novo.

  support: '[servidor de suporte]({support_guild})'

  buttons:
      open_panel: 'Leve-me até o painel'
      guide: 'Guia'

  menus:
    select_option: 'Selecione uma opção...'

  success:
    dm_sent: 'Enviei na sua DM! ;)'

  status:
    actived: 'Ativado'
    disabled: 'Desativado'

    actived_plural: 'Ativadas'
    disabled_plural: 'Desativadas'

    yes: 'Sim'
    no: 'Não'
