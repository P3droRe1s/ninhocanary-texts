manage_multiplier_options:
  buttons:
    disable_multipliers:
      label: 'Desativar multiplicadores'
    enable_multipliers:
      label: 'Ativar multiplicadores'

    add_multiplier:
      label: 'Adicionar multiplicador'
    
    edit_multiplier:
      label: 'Editar multiplicadores'

  modals:
    errors:
      multiplier_defined: 'Mano, esse cargo já é um multiplicador de XP kkkkk'
      invalid_multiplier: >
        Ei, manda um multiplicador válido entre 1.1x e 99.9x, pô.
        Menos que isso ou mais que isso eu não tanko. {sob}

    change_factor:
      title: 'Alterar multiplicador'
      label: 'Novo multiplicador'
      placeholder: 'Digite um valor entre 1.1x e 99.9x'

    add_multiplier:
      title: 'Adicionar multiplicador'
      label: 'Novo multiplicador'

  embed:
    title: 'Editar Multiplicadores'
    description: >-
      Aqui você poderá escolher um multiplicador de XP já criado para visualizar,
      editar suas configurações ou excluir, caso queira. Logo abaixo, há um menu
      com todos os multiplicadores criados neste servidor. Basta clicar nele e
      selecionar o multiplicador desejado.


      {support_text}
    mul_status: '**Multiplicadores de XP:** {status}.'
    stacking_status: '**Empilhar Multiplicadores:** {status}.'

  embed_role:
    description: >-
      Aqui você pode visualizar, ajustar ou excluir este cargo que você
      definiu como multiplicador de XP. Cargos multiplicadores de XP definem quanto XP
      extra os membros com esse cargo vão receber.


      - {role_text}

      - {text_boost}


      {support_text}
    role_text: '**Cargo:** {role_formatted}.'
    text_boost: '**Multiplicador:** {boost}x.'

  note: >-


    **OBS:** Algumas configurações aqui podem não funcionar direito,
    porque os multiplicadores de XP estão desativados. {warning}

manage_role_multiplier_options:
  buttons:
    change_multiplication:
      label: 'Alterar multiplicador'

    del_multplier:
      label: 'Deletar multiplicador'

  messages:
    delete_message: >
      Tem certeza que quer deletar o multiplicador "{role_mention}"?
