manage_rewards_options:
  buttons:
    disable_rewards:
      label: 'Desativar recompensas'
    enable_rewards:
      label: 'Ativar recompensas'

    add_reward:
      label: 'Adicionar recompensa'
    
    edit_reward:
      label: 'Editar recompensas'

  modals:
    errors:
      reward_defined: 'Cara, esse cargo já é uma recompensa kkkkk'

    add_role:
      title: 'Adicionar recompensa'
      label: 'Nova recompensa'    

  embed:
    title: 'Editar Recompensas'
    description: >-
      Aqui você poderá escolher um cargo de recompensa já criado para visualizar,
      editar suas configurações ou excluir, caso queira. Logo abaixo, há um menu
      com todas as recompensas criadas neste servidor. Basta clicar nele e
      selecionar a recompensa desejada.


      {support_text}
    reward_status: '**Recompensas:** {status}.'
    stacking_status: '**Empilhar Recompensas:** {status}.'

  embed_role:
    description: >-
      Aqui você pode ajustar como este cargo de recompensa será conquistado
      e quanto XP o membro precisa para conseguir ele.


      - {role_text}

      - {xp_type_text}

      - {xp_required_text}


      {support_text}
    role_text: '**Cargo:** {role_formatted}.'
    xp_type_text: '**Forma de Conquista:** {xp_type}.'
    xp_required_text: '**XP Necessário:** {xp}.'

  xp_type_list:
    - XP total
    - XP por texto
    - XP em call

  note: >-


    **OBS:** Algumas configurações aqui podem não funcionar direito,
    porque os cargos de recompensa estão desativados. {warning}

manage_role_reward_options:
  buttons:
    edit_unlock:
      label: 'Alterar forma de conquista'

    edit_xp:
      label: 'Alterar XP necessário'

    delete_reward:
      label: 'Deletar recompensa'

  modals:
    errors:
      invalid_xp: >
        Mano, me ajuda aí... só aceito número inteiro de 1 até 1.000.000.000.000 :p

    replace_xp:
      title:  'Alterar XP necessário'
      label: 'Novo valor de XP'
      placeholder: 'Digite um valor entre 1 e 1.000.000.000.000'

  messages:
    delete_message: >
      Tem certeza que quer deletar a recompensa "{role_mention}"?
