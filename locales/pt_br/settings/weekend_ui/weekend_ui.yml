manage_weekend_options:
  buttons:
    disable_weekend_boost:
      label: 'Desativar bônus de fim de semana'
    enable_weekend_boost:
      label: 'Ativar bônus de fim de semana'

    disable_friday_boost:
      label: 'Desativar bônus na sexta-feira'
    enable_friday_boost:
      label: 'Ativar bônus na sexta-feira'

    chance_xp_boost:
      label: 'Alterar bônus de XP'

  modals:
    title: 'Alterar bônus de XP'
    label: 'Novo valor do bônus de XP'

  embed:
    weekend_status: '**Bônus de fim de semana:** {status}.'
    friday_status: '**Bônus na sexta-feira:** {status}.'
    xp_multiplier: '**Bônus de XP:** {multiplier}x.'

  note: >
    **OBS:** Algumas configurações aqui podem não funcionar direito,
    porque o bônus de fim de semana está desativado. {warning}
